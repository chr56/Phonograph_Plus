name: dev
on:
  push:
    branches:
      - 'dev'
      - 'main'
    tags-ignore:
      - 'v*'
      - 'preview_*'
      - 'test*'
    paths-ignore:
      - '.github/**'
      - '.idea/**'
      - 'docs/**'
      - 'fastlane/metadata/android/**'
      - 'tools/changelog-generator/**'
      - 'crowdin.yml'
      - 'fdroid.properties'
      - '*.json'
      - '**.md'
      - 'ReleaseNote*'
  workflow_dispatch:
    inputs:
      with_clean:
        description: "Run Gradle clean before building"
        type: boolean
        default: true
        required: false
  pull_request:
    branches:
      - 'dev'
      - 'main'
    paths-ignore:
      - '.github/**'
      - '.idea/**'
      - '**.md'

jobs:
  build:
    # Matrix builds
    name: "Dev CI Build"
    strategy:
      matrix:
        PRODUCT_VARIANT: [ModernCheckoutDebug, LegacyCheckoutDebug]
    runs-on: ubuntu-24.04
    env:
      STORE_FILE: ${{ github.workspace }}/key.jdk
      STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'adopt'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Recover Signing Keystore
        run: |
          bash ${{ github.workspace }}/scripts/recover_signing_key.sh \
            --secrets-key "${{ secrets.KEY }}" \
            --keystore-file "${STORE_FILE}"

      - name: Clean before building
        id: gradle-clean
        if: ${{ github.event.inputs.with_clean == 'true'}}
        run: |
          ./gradlew app:clean

      - name: Build with Gradle
        id: gradle-build
        run: |
          ./gradlew app:assemble${{ matrix.PRODUCT_VARIANT }} --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: Artifacts_${{ matrix.PRODUCT_VARIANT }}
          path: ./app/build/outputs/apk/*/debug/*.apk
          retention-days: 3
